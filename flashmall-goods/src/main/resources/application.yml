server:
  port: ${SERVER_PORT:9082}

spring:
  application:
    name: flashmall-goods
  config:
    import:
      - "optional:nacos:flashmall-common.yaml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true"
      - "optional:nacos:${spring.application.name}.yaml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true"
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yaml
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        instance-id: ${spring.application.name}:${HOSTNAME:localhost}:${server.port}
    sentinel:
      eager: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
  datasource:
    dynamic:
      primary: master
      strict: true
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_MASTER_HOST:127.0.0.1}:${MYSQL_MASTER_PORT:3306}/${MYSQL_DATABASE:flashmall}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          username: ${MYSQL_USER:root}
          password: ${MYSQL_PASSWORD:root}
        slave:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_SLAVE_HOST:127.0.0.1}:${MYSQL_SLAVE_PORT:3306}/${MYSQL_DATABASE:flashmall}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          username: ${MYSQL_USER:root}
          password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 3s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.flashmall.goods: debug

flashmall:
  config:
    common-message: ${FLASHMALL_COMMON_MESSAGE:local-common}
    goods-message: ${FLASHMALL_GOODS_MESSAGE:local-goods}
    version: ${FLASHMALL_CONFIG_VERSION:local}
  traffic:
    goods:
      probe-qps: ${GOODS_PROBE_QPS:10}
      slow-rt-ms: ${GOODS_SLOW_RT_MS:200}
      slow-ratio-threshold: ${GOODS_SLOW_RATIO_THRESHOLD:0.5}
      slow-min-request-amount: ${GOODS_SLOW_MIN_REQUEST_AMOUNT:5}
      slow-stat-interval-ms: ${GOODS_SLOW_STAT_INTERVAL_MS:10000}
      slow-time-window-seconds: ${GOODS_SLOW_TIME_WINDOW_SECONDS:5}
      exception-ratio-threshold: ${GOODS_EXCEPTION_RATIO_THRESHOLD:0.5}
      exception-min-request-amount: ${GOODS_EXCEPTION_MIN_REQUEST_AMOUNT:5}
      exception-stat-interval-ms: ${GOODS_EXCEPTION_STAT_INTERVAL_MS:10000}
      exception-time-window-seconds: ${GOODS_EXCEPTION_TIME_WINDOW_SECONDS:5}
