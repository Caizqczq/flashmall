upstream goods_round_robin {
    server goods-1:8081 weight=1;
    server goods-2:8082 weight=1;
}

upstream goods_least_conn {
    least_conn;
    server goods-1:8081;
    server goods-2:8082;
}

upstream goods_ip_hash {
    ip_hash;
    server goods-1:8081;
    server goods-2:8082;
}

upstream goods_uri_hash {
    hash $request_uri consistent;
    server goods-1:8081;
    server goods-2:8082;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location /api/goods/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://goods_round_robin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Nginx-Upstream $upstream_addr always;
    }

    location /api/lb/least/goods/ {
        rewrite ^/api/lb/least/(.*)$ /$1 break;
        proxy_pass http://goods_least_conn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Nginx-Upstream $upstream_addr always;
    }

    location /api/lb/iphash/goods/ {
        rewrite ^/api/lb/iphash/(.*)$ /$1 break;
        proxy_pass http://goods_ip_hash;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Nginx-Upstream $upstream_addr always;
    }

    location /api/lb/urihash/goods/ {
        rewrite ^/api/lb/urihash/(.*)$ /$1 break;
        proxy_pass http://goods_uri_hash;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Nginx-Upstream $upstream_addr always;
    }

    location /api/ {
        proxy_pass http://gateway:9080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Nginx-Upstream $upstream_addr always;
    }
}
